kind: wasmer.io/App.v0
name: aether-ai
package: aether-ai/aether-ai@0.1.0
cli_args:
  - -m
  - flask
  - --app
  - /app/server:app
  - run
  - --host
  - 0.0.0.0
  - --port
  - "5000"
  - --no-reload
env:
  PYTHONEXECUTABLE: /bin/python
  PYTHONPATH: /app
  AETHER_GROQ_MODELS: qwen/qwen3-32b,openai/gpt-oss-120b
